<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Sarpras NBS - Nurmilad</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js">
    </script>
    <style>
        /* RESET & BASE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f4f7f4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-size: 16px;
            line-height: 1.5;
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, #1a4d2e, #2d6a4f);
            color: #fff;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }
        .header .right-group {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .header .back {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            padding: 6px 14px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            font-size: 14px;
            transition: 0.2s;
        }
        .header .back:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .header .logout-btn {
            background: #b03a2e;
            color: #fff;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            display: none;
        }
        .header .logout-btn.show {
            display: inline-block;
        }
        .header .logout-btn:hover {
            background: #8a2e24;
        }

        /* CONTAINER */
        .container {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px;
            width: 100%;
        }

        /* TOP BAR - mobile friendly */
        .top-bar {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .top-bar .left-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .top-bar .left-group input,
        .top-bar .left-group select {
            flex: 1 1 100%;
            padding: 12px 16px;
            border: 1px solid #ccc;
            border-radius: 30px;
            font-size: 16px;
            background: #fff;
            min-width: 0;
        }
        .top-bar .left-group .filter-row {
            display: flex;
            gap: 10px;
            width: 100%;
            align-items: center;
        }
        .top-bar .left-group .filter-row select {
            flex: 2;
        }
        .top-bar .left-group .filter-row .reset-filter {
            background: transparent;
            border: none;
            color: #b03a2e;
            font-weight: 600;
            font-size: 14px;
            padding: 8px 12px;
            white-space: nowrap;
            cursor: pointer;
        }
        .top-bar .left-group .filter-row .reset-filter:hover {
            text-decoration: underline;
        }
        .filter-info {
            font-size: 14px;
            color: #3a5a3a;
            background: #e8f0e8;
            padding: 4px 16px;
            border-radius: 30px;
            display: inline-block;
            margin-left: 4px;
        }

        .top-bar .right-group-btns {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .top-bar .admin-btn {
            padding: 12px 24px;
            background: #2d6a4f;
            color: #fff;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            flex: 1 1 auto;
            min-width: 120px;
        }
        .top-bar .admin-btn:hover {
            background: #1a4d2e;
        }
        .top-bar .admin-btn.active {
            background: #b03a2e;
        }
        .top-bar .def-btn {
            background: #5c6b7a;
        }
        .top-bar .def-btn:hover {
            background: #3a4a5a;
        }

        /* ADD BUTTON */
        #addButtonContainer {
            margin: 12px 0 16px;
        }
        #addButtonContainer .admin-btn {
            width: 100%;
            padding: 14px;
            background: #2d6a4f;
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        #addButtonContainer .admin-btn:hover {
            background: #1a4d2e;
        }

        /* TABLE / CARD VIEW */
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            min-width: 700px;
        }
        th {
            background: #eaf0ea;
            padding: 12px 12px;
            text-align: left;
            font-weight: 600;
            color: #1a3d2e;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        th .sort-icon {
            margin-left: 4px;
            opacity: 0.6;
        }
        th .sort-icon.active {
            opacity: 1;
            font-weight: bold;
        }
        td {
            padding: 10px 12px;
            border-bottom: 1px solid #eef4ee;
            vertical-align: middle;
        }
        tr:hover {
            background: #f6faf6;
        }
        .actions {
            display: flex;
            gap: 6px;
        }
        .actions button {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 4px 8px;
            border-radius: 6px;
        }
        .actions button.edit {
            color: #2d6a4f;
        }
        .actions button.edit:hover {
            background: #e0f0e0;
        }
        .actions button.delete {
            color: #b03a2e;
        }
        .actions button.delete:hover {
            background: #f0e0e0;
        }

        .no-data {
            text-align: center;
            padding: 40px 16px;
            color: #7a8a7a;
            font-size: 16px;
        }

        /* MOBILE CARD STYLE (tampilan daftar untuk HP) */
        @media (max-width: 600px) {
            .table-wrapper {
                background: transparent;
                box-shadow: none;
            }
            table thead {
                display: none;
            }
            table,
            table tbody,
            table tr,
            table td {
                display: block;
                width: 100%;
            }
            table tr {
                background: #fff;
                border-radius: 16px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
                margin-bottom: 16px;
                padding: 16px;
                border: none;
            }
            table td {
                border: none;
                padding: 6px 0;
                display: flex;
                justify-content: space-between;
                align-items: center;
                border-bottom: 1px solid #f0f4f0;
            }
            table td:last-child {
                border-bottom: none;
            }
            table td::before {
                content: attr(data-label);
                font-weight: 600;
                color: #1a3d2e;
                flex: 1;
            }
            table td .actions {
                justify-content: flex-end;
            }
            .admin-col {
                display: block !important;
            }
        }

        /* MODAL - full width mobile */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: #fff;
            border-radius: 24px;
            padding: 24px 20px;
            width: 100%;
            max-width: 500px;
            max-height: 95vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .modal-content h2 {
            margin-bottom: 16px;
            color: #1a3d2e;
            font-size: 22px;
        }
        .modal-content .form-group {
            margin-bottom: 16px;
            position: relative;
        }
        .modal-content label {
            display: block;
            font-weight: 600;
            color: #2a4a3a;
            font-size: 15px;
            margin-bottom: 4px;
        }
        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ccc;
            border-radius: 12px;
            font-size: 16px;
            background: #fff;
        }
        .modal-content .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: flex-end;
        }
        .modal-content .btn-group button {
            padding: 12px 28px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            flex: 1;
        }
        .modal-content .btn-group .save {
            background: #2d6a4f;
            color: #fff;
        }
        .modal-content .btn-group .save:hover {
            background: #1a4d2e;
        }
        .modal-content .btn-group .cancel {
            background: #e0e8e0;
            color: #2a4a3a;
        }
        .modal-content .btn-group .cancel:hover {
            background: #d0d8d0;
        }

        /* === CUSTOM DROPDOWN AUTOCOMPLETE === */
        .autocomplete-dropdown {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 12px;
            max-height: 200px;
            overflow-y: auto;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            z-index: 999;
            display: none;
        }
        .autocomplete-dropdown.show {
            display: block;
        }
        .autocomplete-dropdown .item {
            padding: 10px 14px;
            cursor: pointer;
            border-bottom: 1px solid #f0f4f0;
            font-size: 15px;
            transition: background 0.1s;
        }
        .autocomplete-dropdown .item:last-child {
            border-bottom: none;
        }
        .autocomplete-dropdown .item:hover {
            background: #eaf0ea;
        }
        .autocomplete-dropdown .item.highlighted {
            background: #d0e0d0;
        }
        .autocomplete-dropdown .no-result {
            padding: 12px 14px;
            color: #888;
            font-style: italic;
            text-align: center;
        }

        /* TOAST */
        .toast-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 90%;
            max-width: 400px;
        }
        .toast {
            padding: 14px 20px;
            border-radius: 12px;
            color: #fff;
            font-weight: 500;
            font-size: 15px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            animation: slideUp 0.3s ease;
            text-align: center;
        }
        .toast.success {
            background: #2d6a4f;
        }
        .toast.error {
            background: #c0392b;
        }
        .toast.info {
            background: #2c6f9b;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9998;
            font-size: 18px;
            color: #1a3d2e;
            font-weight: 600;
        }
        .loading-overlay.hidden {
            display: none;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #dce4dc;
            border-top-color: #2d6a4f;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 14px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .footer {
            text-align: center;
            padding: 16px;
            color: #5a6a5a;
            font-size: 14px;
            border-top: 1px solid #dce4dc;
            background: #fff;
            margin-top: 20px;
        }
    </style>
</head>

    <script>
        // ============================================================
        // FIREBASE CONFIG
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyCkwJDCIjf1o5hQf52UPp13eRsjWPsVGV0",
            authDomain: "sarprasnbs.firebaseapp.com",
            projectId: "sarprasnbs",
            storageBucket: "sarprasnbs.firebasestorage.app",
            messagingSenderId: "604042513677",
            appId: "1:604042513677:web:3d186ae98c9dd8fe09f444"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ============================================================
        // HELPERS
        // ============================================================
        function showToast(msg, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        function showLoading(show) {
            document.getElementById('loadingOverlay').classList.toggle('hidden', !show);
        }

        // ============================================================
        // ADMIN SESSION
        // ============================================================
        const ADMIN_PASS = 'sarpras123';
        const SESSION_KEY = 'nbs_admin_session';
        let isAdmin = false;

        function getAdminSession() {
            return localStorage.getItem(SESSION_KEY) === 'true';
        }

        function setAdminSession(val) {
            localStorage.setItem(SESSION_KEY, val ? 'true' : 'false');
            isAdmin = val;
            updateAdminUI();
        }

        function logoutAdmin() {
            setAdminSession(false);
            showToast('Anda telah logout dari mode admin', 'info');
            window.location.reload();
        }

        function updateAdminUI() {
            const adminToggle = document.getElementById('adminToggle');
            const logoutBtn = document.getElementById('logoutBtn');
            const adminCols = document.querySelectorAll('.admin-col');

            if (isAdmin) {
                adminToggle.textContent = '🔓 Admin (aktif)';
                adminToggle.classList.add('active');
                logoutBtn.classList.add('show');
                adminCols.forEach(el => el.style.display = 'table-cell');
            } else {
                adminToggle.textContent = '🔐 Admin';
                adminToggle.classList.remove('active');
                logoutBtn.classList.remove('show');
                adminCols.forEach(el => el.style.display = 'none');
            }
            const ruangFilter = document.getElementById('filterRuang').value;
            updateAddButton(ruangFilter);
        }

        // ============================================================
        // STATE
        // ============================================================
        let sortField = 'namaBarang';
        let sortAsc = true;
        let filterRuang = '';
        let allItems = [];
        let definitions = { ruangan: [], gedung: [], jenis: [], sumberDana: [], barang: [] };
        let allBarangNames = [];
        let allSumberDanaNames = [];

        // DOM refs
        const tbody = document.getElementById('inventoryList');
        const searchInput = document.getElementById('searchInput');
        const filterRuangSelect = document.getElementById('filterRuang');
        const filterInfo = document.getElementById('filterInfo');
        const resetFilterBtn = document.getElementById('resetFilterBtn');
        const adminToggle = document.getElementById('adminToggle');
        const defBtn = document.getElementById('defBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const modal = document.getElementById('modal');
        const modalTitle = document.getElementById('modalTitle');
        const editId = document.getElementById('editId');
        const f_nama = document.getElementById('f_nama');
        const f_jumlah = document.getElementById('f_jumlah');
        const f_tahun = document.getElementById('f_tahun');
        const f_sumberDana = document.getElementById('f_sumberDana');
        const f_baik = document.getElementById('f_baik');
        const f_ringan = document.getElementById('f_ringan');
        const f_berat = document.getElementById('f_berat');
        const f_ruang = document.getElementById('f_ruang');
        const f_gedung = document.getElementById('f_gedung');
        const f_jenis = document.getElementById('f_jenis');
        const f_anggaran = document.getElementById('f_anggaran');
        const modalCancel = document.getElementById('modalCancel');
        const modalSave = document.getElementById('modalSave');
        const emptyMsg = document.getElementById('emptyMessage');
        const addButtonContainer = document.getElementById('addButtonContainer');

        const dropdownNama = document.getElementById('dropdownNama');
        const dropdownSumber = document.getElementById('dropdownSumber');

        const inventoryRef = db.collection('inventory');
        let unsubscribe = null;

        // ============================================================
        // AUTOCOMPLETE CUSTOM DROPDOWN
        // ============================================================
        function createAutocomplete(inputElement, dropdownElement, allOptions) {
            let currentFocus = -1;
            let filteredOptions = [];

            function filterOptions(value) {
                const search = value.toLowerCase().trim();
                if (!search) return allOptions.slice(0, 50);
                let filtered = allOptions.filter(name =>
                    name.toLowerCase().includes(search)
                );
                // Urutkan: awalan lebih dulu
                filtered.sort((a, b) => {
                    const aLow = a.toLowerCase();
                    const bLow = b.toLowerCase();
                    const aStarts = aLow.startsWith(search);
                    const bStarts = bLow.startsWith(search);
                    if (aStarts && !bStarts) return -1;
                    if (!aStarts && bStarts) return 1;
                    return a.localeCompare(b);
                });
                return filtered.slice(0, 50);
            }

            function renderDropdown(options) {
                dropdownElement.innerHTML = '';
                if (!options || options.length === 0) {
                    const div = document.createElement('div');
                    div.className = 'no-result';
                    div.textContent = 'Tidak ada data';
                    dropdownElement.appendChild(div);
                    dropdownElement.classList.add('show');
                    return;
                }
                options.forEach((name, index) => {
                    const div = document.createElement('div');
                    div.className = 'item';
                    if (index === currentFocus) div.classList.add('highlighted');
                    div.textContent = name;
                    div.dataset.value = name;
                    div.addEventListener('mousedown', (e) => {
                        e.preventDefault();
                        inputElement.value = name;
                        dropdownElement.classList.remove('show');
                        inputElement.focus();
                    });
                    dropdownElement.appendChild(div);
                });
                dropdownElement.classList.add('show');
            }

            function updateDropdown() {
                const val = inputElement.value;
                filteredOptions = filterOptions(val);
                renderDropdown(filteredOptions);
                currentFocus = -1;
            }

            function closeDropdown() {
                dropdownElement.classList.remove('show');
                currentFocus = -1;
            }

            // Event listeners
            inputElement.addEventListener('input', updateDropdown);
            inputElement.addEventListener('focus', () => {
                // Tampilkan semua opsi saat fokus
                filteredOptions = allOptions.slice(0, 50);
                renderDropdown(filteredOptions);
                currentFocus = -1;
            });
            inputElement.addEventListener('blur', () => {
                // Delay untuk menangani klik item
                setTimeout(closeDropdown, 200);
            });

            // Keyboard navigasi
            inputElement.addEventListener('keydown', (e) => {
                const items = dropdownElement.querySelectorAll('.item');
                if (items.length === 0) return;

                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    currentFocus = (currentFocus + 1) % items.length;
                    highlightItem(items, currentFocus);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    currentFocus = (currentFocus - 1 + items.length) % items.length;
                    highlightItem(items, currentFocus);
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (currentFocus >= 0 && currentFocus < items.length) {
                        const selected = items[currentFocus].dataset.value;
                        inputElement.value = selected;
                        closeDropdown();
                    }
                } else if (e.key === 'Escape') {
                    closeDropdown();
                }
            });

            function highlightItem(items, index) {
                items.forEach((el, i) => {
                    el.classList.toggle('highlighted', i === index);
                });
                // Scroll ke item yang terpilih
                if (items[index]) {
                    items[index].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                }
            }

            // Fungsi untuk memperbarui daftar opsi (jika ada perubahan dari Firebase)
            return {
                updateOptions: (newOptions) => {
                    allOptions = newOptions;
                },
                close: closeDropdown,
                refresh: updateDropdown
            };
        }

        let autocompleteNama, autocompleteSumber;

        // ============================================================
        // LOAD DEFINITIONS
        // ============================================================
        async function loadDefinitions() {
            try {
                const [ruangSnap, gedungSnap, jenisSnap, sumberSnap, barangSnap] = await Promise.all([
                    db.collection('ruangan').get(),
                    db.collection('gedung').get(),
                    db.collection('jenis').get(),
                    db.collection('sumber_dana').get(),
                    db.collection('barang').get()
                ]);

                definitions.ruangan = ruangSnap.docs.map(d => ({ id: d.id, nama: d.data().nama }));
                definitions.gedung = gedungSnap.docs.map(d => ({ id: d.id, nama: d.data().nama }));
                definitions.jenis = jenisSnap.docs.map(d => ({ id: d.id, nama: d.data().nama }));
                definitions.sumberDana = sumberSnap.docs.map(d => ({ id: d.id, nama: d.data().nama }));
                definitions.barang = barangSnap.docs.map(d => ({ id: d.id, nama: d.data().nama }));

                allBarangNames = definitions.barang.map(b => b.nama).filter(Boolean).sort();
                allSumberDanaNames = definitions.sumberDana.map(s => s.nama).filter(Boolean).sort();

                // Populate dropdowns
                populateDropdowns();
                populateFilterRuang();

                // Inisialisasi autocomplete
                autocompleteNama = createAutocomplete(f_nama, dropdownNama, allBarangNames);
                autocompleteSumber = createAutocomplete(f_sumberDana, dropdownSumber, allSumberDanaNames);

            } catch (err) {
                console.error('Load definitions error:', err);
                showToast('Gagal memuat definisi: ' + err.message, 'error');
            }
        }

        function populateDropdowns() {
            f_ruang.innerHTML = '<option value="">Pilih Ruang</option>';
            definitions.ruangan.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r.nama;
                opt.textContent = r.nama;
                f_ruang.appendChild(opt);
            });

            f_gedung.innerHTML = '<option value="">Pilih Gedung</option>';
            definitions.gedung.forEach(g => {
                const opt = document.createElement('option');
                opt.value = g.nama;
                opt.textContent = g.nama;
                f_gedung.appendChild(opt);
            });

            f_jenis.innerHTML = '<option value="">Pilih Jenis</option>';
            definitions.jenis.forEach(j => {
                const opt = document.createElement('option');
                opt.value = j.nama;
                opt.textContent = j.nama;
                f_jenis.appendChild(opt);
            });
        }

        function populateFilterRuang() {
            const ruangNames = definitions.ruangan.map(r => r.nama).sort();
            filterRuangSelect.innerHTML = '<option value="">🏢 Semua Ruang</option>';
            ruangNames.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r;
                opt.textContent = r;
                filterRuangSelect.appendChild(opt);
            });
            if (filterRuang) filterRuangSelect.value = filterRuang;
        }

        // ============================================================
        // LOAD INVENTORY (REALTIME)
        // ============================================================
        function loadInventory() {
            if (unsubscribe) unsubscribe();
            unsubscribe = inventoryRef.onSnapshot(snapshot => {
                allItems = [];
                snapshot.forEach(doc => {
                    allItems.push({ id: doc.id, ...doc.data() });
                });
                console.log('Data dimuat:', allItems.length, 'item');
                applyFiltersAndSort();
            }, err => {
                console.error('Snapshot error:', err);
                showToast('Gagal memuat data: ' + err.message, 'error');
            });
        }

        // ============================================================
        // FILTER & SORT
        // ============================================================
        function applyFiltersAndSort() {
            const search = searchInput.value.toLowerCase().trim();
            const ruangFilter = filterRuangSelect.value;

            let filtered = allItems.slice();

            if (ruangFilter) {
                filtered = filtered.filter(item => item.ruang === ruangFilter);
            }

            if (search) {
                filtered = filtered.filter(item =>
                    (item.namaBarang && item.namaBarang.toLowerCase().includes(search)) ||
                    (item.ruang && item.ruang.toLowerCase().includes(search)) ||
                    (item.lokasiGedung && item.lokasiGedung.toLowerCase().includes(search)) ||
                    (item.jenis && item.jenis.toLowerCase().includes(search)) ||
                    (item.asalPerolehan && item.asalPerolehan.toLowerCase().includes(search))
                );
            }

            if (sortField && sortField !== 'no') {
                filtered.sort((a, b) => {
                    let valA = a[sortField] ?? '';
                    let valB = b[sortField] ?? '';
                    if (['jumlahBarang', 'tahunPerolehan', 'baik', 'rusakRingan', 'rusakBerat'].includes(sortField)) {
                        valA = Number(valA) || 0;
                        valB = Number(valB) || 0;
                        return sortAsc ? valA - valB : valB - valA;
                    } else {
                        valA = String(valA).toLowerCase();
                        valB = String(valB).toLowerCase();
                        return sortAsc ? valA.localeCompare(valB) : valB.localeCompare(valA);
                    }
                });
            }

            renderItems(filtered);
            updateSortIcons();
            updateFilterInfo(ruangFilter);
            updateAddButton(ruangFilter);
        }

        // ============================================================
        // RENDER (dengan label untuk mobile)
        // ============================================================
        function renderItems(items) {
            tbody.innerHTML = '';
            if (items.length === 0) {
                emptyMsg.style.display = 'block';
                return;
            }
            emptyMsg.style.display = 'none';

            items.forEach((item, idx) => {
                const tr = document.createElement('tr');
                const fields = [
                    { key: 'no', label: 'No' },
                    { key: 'namaBarang', label: 'Nama Barang' },
                    { key: 'jumlahBarang', label: 'Jumlah' },
                    { key: 'tahunPerolehan', label: 'Tahun' },
                    { key: 'asalPerolehan', label: 'Sumber Dana' },
                    { key: 'baik', label: 'Baik' },
                    { key: 'rusakRingan', label: 'Rusak Ringan' },
                    { key: 'rusakBerat', label: 'Rusak Berat' },
                    { key: 'ruang', label: 'Ruang' },
                    { key: 'lokasiGedung', label: 'Gedung' },
                    { key: 'jenis', label: 'Jenis' }
                ];

                let html = '';
                fields.forEach((f, i) => {
                    let value = item[f.key] ?? '';
                    if (f.key === 'no') value = idx + 1;
                    if (['jumlahBarang', 'baik', 'rusakRingan', 'rusakBerat'].includes(f.key)) value = Number(value) || 0;
                    html += `<td data-label="${f.label}">${value}</td>`;
                });

                const actionCol = `
                    <td data-label="Aksi" class="admin-col" style="display:${isAdmin ? 'table-cell' : 'none'};">
                        <div class="actions">
                            <button class="edit" data-id="${item.id}" title="Edit">✏️</button>
                            <button class="delete" data-id="${item.id}" title="Hapus">🗑️</button>
                        </div>
                    </td>
                `;
                html += actionCol;

                tr.innerHTML = html;
                tbody.appendChild(tr);
            });

            if (isAdmin) {
                document.querySelectorAll('.edit').forEach(btn =>
                    btn.addEventListener('click', (e) => openEdit(e.target.closest('button').dataset.id))
                );
                document.querySelectorAll('.delete').forEach(btn =>
                    btn.addEventListener('click', (e) => deleteItem(e.target.closest('button').dataset.id))
                );
            }
        }

        function updateSortIcons() {
            document.querySelectorAll('th[data-field]').forEach(th => {
                const field = th.dataset.field;
                const icon = th.querySelector('.sort-icon');
                if (!icon) return;
                if (field === sortField) {
                    icon.textContent = sortAsc ? ' ▲' : ' ▼';
                    icon.classList.add('active');
                } else {
                    icon.textContent = ' ↕';
                    icon.classList.remove('active');
                }
            });
        }

        function updateFilterInfo(ruang) {
            if (ruang) {
                filterInfo.textContent = `Menampilkan: Ruang ${ruang}`;
                filterInfo.style.display = 'inline-block';
                resetFilterBtn.style.display = 'inline-block';
            } else {
                filterInfo.style.display = 'none';
                resetFilterBtn.style.display = 'none';
            }
        }

        // ============================================================
        // ADD BUTTON
        // ============================================================
        function updateAddButton(ruang) {
            if (!isAdmin) {
                addButtonContainer.innerHTML = '';
                return;
            }
            let label = '➕ Tambah Barang';
            if (ruang) label = `➕ Tambah Barang di ${ruang}`;
            addButtonContainer.innerHTML = `<button class="admin-btn" id="addBtn">${label}</button>`;
            document.getElementById('addBtn').addEventListener('click', () => {
                openModal('Tambah Barang', ruang ? { ruang: ruang } : {});
            });
        }

        // ============================================================
        // SORT HEADER CLICK
        // ============================================================
        document.querySelectorAll('th[data-field]').forEach(th => {
            th.addEventListener('click', () => {
                const field = th.dataset.field;
                if (field === 'no') return;
                if (sortField === field) {
                    sortAsc = !sortAsc;
                } else {
                    sortField = field;
                    sortAsc = true;
                }
                applyFiltersAndSort();
            });
        });

        // ============================================================
        // FILTER & SEARCH EVENTS
        // ============================================================
        filterRuangSelect.addEventListener('change', () => {
            filterRuang = filterRuangSelect.value;
            applyFiltersAndSort();
        });

        resetFilterBtn.addEventListener('click', () => {
            filterRuangSelect.value = '';
            filterRuang = '';
            applyFiltersAndSort();
        });

        searchInput.addEventListener('input', applyFiltersAndSort);

        // ============================================================
        // ADMIN TOGGLE & LOGOUT
        // ============================================================
        adminToggle.addEventListener('click', () => {
            if (isAdmin) {
                showToast('Anda sudah dalam mode admin. Klik Logout untuk keluar.', 'info');
                return;
            }
            const pass = prompt('Masukkan password admin:');
            if (pass === ADMIN_PASS) {
                setAdminSession(true);
                showToast('Mode admin aktif', 'success');
                applyFiltersAndSort();
            } else if (pass !== null) {
                showToast('Password salah!', 'error');
            }
        });

        logoutBtn.addEventListener('click', logoutAdmin);

        defBtn.addEventListener('click', () => {
            if (!isAdmin) {
                showToast('Anda harus masuk sebagai admin terlebih dahulu', 'error');
                return;
            }
            window.location.href = 'definisi.html';
        });

        // ============================================================
        // MODAL
        // ============================================================
        function isValidOption(value, list) {
            if (!value) return true;
            return list.some(item => item.nama.toLowerCase() === value.toLowerCase());
        }

        function openModal(title, data = {}) {
            modalTitle.textContent = title;
            editId.value = data.id || '';
            f_nama.value = data.namaBarang || '';
            f_jumlah.value = data.jumlahBarang || 0;
            f_tahun.value = data.tahunPerolehan || '';
            f_sumberDana.value = data.asalPerolehan || '';
            f_baik.value = data.baik || 0;
            f_ringan.value = data.rusakRingan || 0;
            f_berat.value = data.rusakBerat || 0;
            f_ruang.value = data.ruang || '';
            f_gedung.value = data.lokasiGedung || '';
            f_jenis.value = data.jenis || '';
            f_anggaran.value = data.anggaranSatuan || '';

            // Tutup dropdown jika terbuka
            if (autocompleteNama) autocompleteNama.close();
            if (autocompleteSumber) autocompleteSumber.close();

            modal.classList.add('show');
        }

        function closeModal() {
            modal.classList.remove('show');
        }

        modalCancel.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        modalSave.addEventListener('click', async () => {
            const id = editId.value;
            const namaBarang = f_nama.value.trim();
            const sumberDana = f_sumberDana.value.trim();

            if (!isValidOption(namaBarang, definitions.barang)) {
                showToast('Nama barang harus dipilih dari daftar yang tersedia', 'error');
                f_nama.focus();
                return;
            }
            if (sumberDana && !isValidOption(sumberDana, definitions.sumberDana)) {
                showToast('Sumber dana harus dipilih dari daftar yang tersedia', 'error');
                f_sumberDana.focus();
                return;
            }

            const data = {
                namaBarang,
                jumlahBarang: parseInt(f_jumlah.value) || 0,
                tahunPerolehan: parseInt(f_tahun.value) || 0,
                asalPerolehan: sumberDana,
                baik: parseInt(f_baik.value) || 0,
                rusakRingan: parseInt(f_ringan.value) || 0,
                rusakBerat: parseInt(f_berat.value) || 0,
                ruang: f_ruang.value,
                lokasiGedung: f_gedung.value,
                jenis: f_jenis.value,
                anggaranSatuan: f_anggaran.value.trim()
            };

            try {
                showLoading(true);
                if (id) {
                    await inventoryRef.doc(id).update(data);
                    showToast('Data berhasil diperbarui', 'success');
                } else {
                    await inventoryRef.add(data);
                    showToast('Data berhasil ditambahkan', 'success');
                }
                closeModal();
            } catch (err) {
                showToast('Gagal menyimpan: ' + err.message, 'error');
            } finally {
                showLoading(false);
            }
        });

        function openEdit(id) {
            inventoryRef.doc(id).get().then(doc => {
                if (doc.exists) openModal('Edit Barang', { id: doc.id, ...doc.data() });
                else showToast('Data tidak ditemukan', 'error');
            }).catch(err => showToast('Error: ' + err.message, 'error'));
        }

        function deleteItem(id) {
            if (!confirm('Yakin ingin menghapus data ini?')) return;
            inventoryRef.doc(id).delete().then(() => {
                showToast('Data dihapus', 'success');
            }).catch(err => showToast('Gagal hapus: ' + err.message, 'error'));
        }

        // ============================================================
        // INIT
        // ============================================================
        isAdmin = getAdminSession();
        updateAdminUI();

        loadDefinitions().then(() => {
            loadInventory();
        }).catch(err => {
            console.error('Init error:', err);
            showToast('Gagal inisialisasi: ' + err.message, 'error');
        });

        setTimeout(() => updateAdminUI(), 500);
    </script>

</body>
</html>
